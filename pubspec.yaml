name: ufit
description: uFit - Your All-in-One Daily Health & Fitness Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Local Database
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI & Animations
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  table_calendar: ^3.1.2
  flutter_slidable: ^3.1.1

  # Navigation
  go_router: ^14.2.0

  # Payments

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Firebase Auth & Backend
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.0
  csv: ^8.0.0
  share_plus: ^12.0.2
  pdf: ^3.12.0
  printing: ^5.14.3
  google_generative_ai: ^0.4.7
  http: ^1.6.0
  flutter_svg: ^2.3.0
  pedometer: ^4.2.0
  purchases_flutter: ^10.4.1
  confetti: ^0.8.0
  health: ^13.3.1
  home_widget: ^0.9.3
  flutter_dotenv: ^6.0.1
  font_awesome_flutter: ^10.7.0
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ufit_icon_new.png"
  min_sdk_android: 21
